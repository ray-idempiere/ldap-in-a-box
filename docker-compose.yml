services:
  ldap-master:
    build: ./ldap
    container_name: ldap-master
    ports:
      - "${LDAP_PORT:-389}:389"
      - "${LDAPS_PORT:-636}:636"
    environment:
      LDAP_ORGANISATION: "${LDAP_ORGANISATION:-My Company}"
      LDAP_DOMAIN: "${LDAP_DOMAIN:-example.com}"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD:-change_me}"
      LDAP_TLS: "true"
      LDAP_TLS_VERIFY_CLIENT: "never"
      LDAP_SEED_INTERNAL_LDIF_PATH: /container/service/slapd/assets/config/bootstrap/ldif/custom
      LDAP_SEED_INTERNAL_SCHEMA_PATH: /container/service/slapd/assets/config/bootstrap/schema/custom
    volumes:
      - ldap-data:/var/lib/ldap
      - ldap-config:/etc/ldap/slapd.d
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-b", "", "-s", "base" ]
      interval: 30s
      timeout: 5s
      retries: 3

  ldap-web:
    build: .
    container_name: ldap-web
    ports:
      - "${WEB_PORT:-8443}:8000"
    environment:
      LDAP_HOST: ldap-master
      LDAP_PORT: 389
      LDAP_DOMAIN: "${LDAP_DOMAIN:-example.com}"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD:-change_me}"
      JWT_SECRET: "${JWT_SECRET:-change_me_to_random_string}"
      TZ: "${TZ:-Asia/Taipei}"
    depends_on:
      ldap-master:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ldap-data:
  ldap-config:
