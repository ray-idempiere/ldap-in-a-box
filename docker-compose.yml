services:
  ldap-master:
    build: ./ldap
    container_name: ldap-master
    ports:
      - "${LDAP_PORT:-389}:389"
      - "${LDAPS_PORT:-636}:636"
    environment:
      LDAP_ORGANISATION: "${LDAP_ORGANISATION:-My Company}"
      LDAP_DOMAIN: "${LDAP_DOMAIN:-example.com}"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD:-change_me}"
      LDAP_TLS: "true"
      LDAP_TLS_VERIFY_CLIENT: "never"
    volumes:
      - ldap-data:/var/lib/ldap
      - ldap-config:/etc/ldap/slapd.d
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-b", "", "-s", "base" ]
      interval: 30s
      timeout: 5s
      retries: 3

  ldap-web:
    build: .
    container_name: ldap-web
    expose:
      - "8000"
    environment:
      LDAP_HOST: ldap-master
      LDAP_PORT: 389
      LDAP_DOMAIN: "${LDAP_DOMAIN:-example.com}"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD:-change_me}"
      JWT_SECRET: "${JWT_SECRET:-change_me_to_random_string}"
      TZ: "${TZ:-Asia/Taipei}"
    depends_on:
      ldap-master:
        condition: service_healthy
    volumes:
      - frontend-static:/app/static
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ldap-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - nginx-ssl:/etc/nginx/ssl
      - frontend-static:/usr/share/nginx/html:ro
    entrypoint: /entrypoint.sh
    depends_on:
      - ldap-web
    restart: unless-stopped

volumes:
  ldap-data:
  ldap-config:
  nginx-ssl:
  frontend-static:
